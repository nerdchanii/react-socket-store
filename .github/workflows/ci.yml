name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react-version: [18, 19]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install --no-save react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }}
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify documentation build
        run: npm run docs:build
      - run: npm run pack:dry-run
